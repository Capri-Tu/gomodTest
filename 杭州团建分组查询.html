<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>莫干山团建 · 分组信息查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, 'Noto Sans', sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .hero {
            background: linear-gradient(135deg, #1a2a4f 0%, #1e3a5f 100%);
            padding: 32px 24px 28px;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-top: 6px;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.7rem;
            margin-top: 14px;
        }

        .search-section {
            padding: 28px 24px 20px;
            border-bottom: 1px solid #eef2f8;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: white;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        .search-box:focus {
            border-color: #2c4f7c;
            box-shadow: 0 0 0 3px rgba(44, 79, 124, 0.15);
        }

        .search-btn {
            background: #2c4f7c;
            color: white;
            border: none;
            padding: 0 24px;
            height: 52px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .search-btn:active {
            transform: scale(0.96);
            background: #1a3a5c;
        }

        .hint {
            font-size: 0.7rem;
            color: #6c7a8e;
            margin-top: 10px;
            margin-left: 8px;
        }

        .result-area {
            padding: 16px 24px 32px;
        }

        .result-card {
            background: #f8fafd;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #eef2f8;
        }

        .not-found {
            background: #fff9ef;
            border-left: 4px solid #d97706;
            border-radius: 20px;
            padding: 18px;
            color: #b45309;
            font-weight: 500;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            padding: 10px 0;
            border-bottom: 1px solid #eef2f8;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            width: 80px;
            font-weight: 600;
            color: #1e2a44;
        }

        .info-value {
            flex: 1;
            color: #0f172a;
            font-weight: 500;
            word-break: break-word;
        }

        .roommate-tag, .captain-tag {
            background: #eef3fa;
            color: #2c4f7c;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 4px;
        }

        .captain-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        footer {
            text-align: center;
            padding: 18px 24px 24px;
            font-size: 0.75rem;
            color: #6c7a8e;
            border-top: 1px solid #eef2f8;
            background: white;
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            .input-group {
                flex-direction: column;
            }
            .search-btn {
                width: 100%;
            }
            .info-label {
                width: 70px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<div class="card">

    </div>

    <footer>
        预祝大家旅途愉快 🚌

</div>

    // ===== 以下为查询逻辑 =====
    function normalizeName(str) {
        return str.trim().replace(/\s+/g, '');
    }

    function searchMember(keyword) {
        if (!keyword) return null;
        const normalizedKeyword = normalizeName(keyword);
        let exactMatch = MEMBERS_DATA.find(m => normalizeName(m.name) === normalizedKeyword);
        if (exactMatch) return exactMatch;
        let fuzzyMatch = MEMBERS_DATA.find(m => normalizeName(m.name).includes(normalizedKeyword) || normalizedKeyword.includes(normalizeName(m.name)));
        return fuzzyMatch || null;
    }

    function getCaptainsByBus(busName) {
        const captains = CAPTAINS_DATA[busName];
        if (!captains || captains.length === 0) {
            return [{ name: "待确认", phone: "请稍后留意群通知" }];
        }
        return captains;
    }

    function renderResult(member, searchRaw) {
        const resultDiv = document.getElementById('resultArea');
        if (!member) {
            resultDiv.innerHTML = `
                <div class="not-found">
                    🔍 未找到 “${escapeHtml(searchRaw)}” 的信息<br>
                    请确认姓名是否正确，或联系人力资源部-王丹阳协助。
                </div>
            `;
            return;
        }

        const captains = getCaptainsByBus(member.bus);
        const roommateDisplay = (member.roommate && member.roommate.trim()) ? member.roommate : '单人间（无室友）';

        let captainsHtml = '';
        captains.forEach(captain => {
            captainsHtml += `<span class="captain-tag">${escapeHtml(captain.name)} · ${escapeHtml(captain.phone)}</span>`;
        });

        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="info-row">
                    <div class="info-label">👤 姓名</div>
                    <div class="info-value">${escapeHtml(member.name)}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">🚌 车队</div>
                    <div class="info-value"><strong>${escapeHtml(member.bus)}</strong></div>
                </div>
                <div class="info-row">
                    <div class="info-label">🏠 室友</div>
                    <div class="info-value"><span class="roommate-tag">${escapeHtml(roommateDisplay)}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">👑 车队长</div>
                    <div class="info-value"><div class="captain-list">${captainsHtml}</div></div>
                </div>
                <div class="info-row" style="padding-top: 12px;">
                    <div class="info-label"></div>
                    <div class="info-value" style="font-size: 0.7rem; color: #6c7a8e;">✅ 出发前请记好车队及车队长电话，如有问题可及时联系</div>
                </div>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function handleSearch() {
        const inputEl = document.getElementById('searchInput');
        const rawValue = inputEl.value;
        if (!rawValue.trim()) {
            document.getElementById('resultArea').innerHTML = `
                <div class="result-card" style="background: #f8fafd; text-align: center; color: #6c7a8e;">
                    ℹ️ 如有疑问，请联系人力资源部-王丹阳
                </div>
            `;
            return;
        }
        const matched = searchMember(rawValue);
        renderResult(matched, rawValue.trim());
    }

    const btn = document.getElementById('searchBtn');
    const input = document.getElementById('searchInput');
    btn.addEventListener('click', handleSearch);
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSearch();
        }
    });
